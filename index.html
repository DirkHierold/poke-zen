<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PocketPet 151 (Test)</title>
    <style>
        @import url('https://googleapis.com');

        body { 
            font-family: 'Press Start 2P', monospace; 
            text-align: center; 
            background: #070a12; 
            color: #38bdf8; 
            padding-top: 40px; 
            margin: 0;
            overflow: hidden;
            transition: background 0.4s;
            user-select: none;
            -webkit-user-select: none; 
        }
        
        body.eco-mode { background: #000000 !important; }
        body.eco-mode button, body.eco-mode #timer, body.eco-mode #collection {
            opacity: 0 !important;
            pointer-events: none;
        }
        body.eco-mode #incubator { 
            transform: scale(0.45); 
            background: transparent !important;
            border-color: rgba(56, 189, 248, 0.2) !important;
            box-shadow: none !important;
        }
        body.eco-mode #mainSprite {
            filter: brightness(0) invert(1) drop-shadow(0 0 5px #38bdf8);
        }

        #incubator {
            width: 160px; height: 160px;
            margin: 30px auto;
            background: #111827;
            border: 4px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        
        #mainSprite {
            width: 120px; height: 120px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            transition: transform 0.3s;
        }
        
        #timer { 
            font-size: 28px; 
            margin: 25px 0; 
            color: #38bdf8; 
            transition: opacity 0.3s; 
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        
        button {
            background: #111827; 
            color: #38bdf8; 
            border: 4px solid #38bdf8;
            font-family: 'Press Start 2P', monospace;
            font-size: 20px;
            padding: 15px 25px;
            cursor: pointer; margin: 10px;
            transition: all 0.2s;
            box-shadow: 4px 4px 0px #1e293b;
        }
        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px transparent;
        }
        
        #collection {
            margin-top: 40px;
            padding: 15px;
            background: #0b0f19;
            border-top: 4px dashed rgba(56, 189, 248, 0.3);
            min-height: 140px;
            transition: opacity 0.3s;
            overflow-x: auto;
            white-space: nowrap;
        }
        .pet-icon {
            width: 56px; height: 56px;
            display: inline-block;
            margin: 5px;
            background: #111827;
            border: 2px solid rgba(56, 189, 248, 0.4);
            image-rendering: pixelated;
        }
        
        #screen-click-trigger {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; display: none;
        }
    </style>
</head>
<body>

    <div id="screen-click-trigger" onclick="toggleEcoMode()"></div>
    
    <div id="incubator">
        <img id="mainSprite" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="status">
    </div>
    
    <div id="timer">00:10</div>
    
    <button id="startBtn" onclick="startHatching()">START</button>
    <button id="resetBtn" onclick="forceReset()" style="display:none; border-color:#f87171; color:#f87171; box-shadow: 4px 4px 0px #451a1a;">TRY AGAIN</button>

    <div id="collection">
        <div id="petList"></div>
    </div>

    <script>
        const EGG_SPRITE = "https://githubusercontent.com";
        const FAIL_SPRITE = "https://githubusercontent.com"; 

        // !!! TEST-EINSTELLUNG: AUF 10 SEKUNDEN GESETZT !!!
        let duration = 10; 
        let lastTime = Date.now();
        let isRunning = false;
        let isShattered = false;
        let wakeLock = null;

        const spriteImg = document.getElementById('mainSprite');

        window.addEventListener('load', () => {
            updateCollectionUI();
            const savedState = localStorage.getItem('pet151_state');
            
            if (savedState === 'RUNNING' || savedState === 'SHATTERED') {
                shatterEgg();
            } else {
                spriteImg.src = EGG_SPRITE;
            }
        });

        async function startHatching() {
            if (isRunning || isShattered) return;
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}

            isRunning = true;
            localStorage.setItem('pet151_state', 'RUNNING');
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('screen-click-trigger').style.display = 'block';
            
            spriteImg.src = EGG_SPRITE;
            document.getElementById('incubator').style.borderColor = "#38bdf8";
            lastTime = Date.now();
        }

        const countdown = setInterval(() => {
            if (!isRunning || isShattered) return;

            const currentTime = Date.now();
            const timePassed = currentTime - lastTime;
            lastTime = currentTime;

            if (timePassed > 4000) { shatterEgg(); return; }

            duration--;
            let minutes = Math.floor(duration / 60);
            let seconds = duration % 60;
            document.getElementById('timer').innerText = `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            if (duration <= 0) {
                clearInterval(countdown);
                isRunning = false;
                localStorage.setItem('pet151_state', 'SUCCESS');
                
                const randomId = Math.floor(Math.random() * 151) + 1;
                const pokemonSpriteUrl = `https://githubusercontent.com{randomId}.png`;
                
                savePet(pokemonSpriteUrl);
                
                spriteImg.src = pokemonSpriteUrl;
                document.getElementById('incubator').style.borderColor = "#4ade80";
                document.getElementById('timer').innerText = "GOTCHA!";
                document.getElementById('timer').style.color = "#4ade80";
                
                if(document.body.classList.contains('eco-mode')) toggleEcoMode();
                document.getElementById('screen-click-trigger').style.display = 'none';
                if (wakeLock) wakeLock.release();
            }
        }, 1000);

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && isRunning && !isShattered) shatterEgg();
        });

        function toggleEcoMode() {
            if (!isRunning || isShattered) return;
            const body = document.body;
            if (!body.classList.contains('eco-mode')) {
                body.classList.add('eco-mode');
            } else {
                body.classList.remove('eco-mode');
                lastTime = Date.now(); 
            }
        }

        function shatterEgg() {
            isShattered = true;
            isRunning = false;
            localStorage.setItem('pet151_state', 'SHATTERED');
            
            spriteImg.src = FAIL_SPRITE;
            document.getElementById('incubator').style.borderColor = "#f87171";
            document.getElementById('timer').innerText = "ERROR";
            document.getElementById('timer').style.color = "#f87171";
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'inline-block';
            document.getElementById('screen-click-trigger').style.display = 'none';
            
            if(document.body.classList.contains('eco-mode')) document.body.classList.remove('eco-mode');
            if (wakeLock) wakeLock.release();
        }

        function forceReset() {
            localStorage.setItem('pet151_state', 'IDLE');
            location.reload();
        }

        function savePet(url) {
            let myPets = JSON.parse(localStorage.getItem('my_retro_pokemon')) || [];
            myPets.push(url);
            localStorage.setItem('my_retro_pokemon', JSON.stringify(myPets));
            updateCollectionUI();
        }

        function updateCollectionUI() {
            let myPets = JSON.parse(localStorage.getItem('my_retro_pokemon')) || [];
            const listDiv = document.getElementById('petList');
            listDiv.innerHTML = "";
            
            myPets.forEach(url => {
                const img = document.createElement('img');
                img.className = 'pet-icon';
                img.src = url;
                listDiv.appendChild(img);
            });
        }
    </script>
</body>
</html>
